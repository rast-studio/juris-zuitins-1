name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ieliek build marķieri
        run: sed -i "s/BUILD_SHA/${{ github.sha }}/" index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Privātā repo Pages deployment statuss nekad nepabeidzas (saturs aiziet
      # dzīvē, bet "in progress" karājas un bloķē nākamo deploy), tāpēc pirms
      # deploy atbrīvojam iepriekšējos un beigās atbrīvojam savējo.
      - name: Atbrīvo iepriekšējo iesprūdušo deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha="${{ github.event.before }}"
          [ -n "$sha" ] && curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/deployments/$sha/cancel" || true

      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 60000

      # Darbs vienmēr beidzas zaļš, lai deploy-pages pēcsolis neatceļ
      # deployment pirms izplatīšanās. Ja saturs neparādās, to redz logos.
      - name: Gaida līdz jaunais saturs ir dzīvs
        id: gaida
        run: |
          echo "found=0" >> "$GITHUB_OUTPUT"
          for i in $(seq 1 105); do
            if curl -s "https://rast-studio.github.io/juris-zuitins-1/?b=${{ github.sha }}-$i" | grep -q "${{ github.sha }}"; then
              echo "jaunais saturs dzīvs pēc $i mēģin."
              echo "found=1" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "mēģin. $i: vēl vecais saturs"
            sleep 20
          done
          echo "jaunais saturs neparādījās 35 min laikā, deployment paliek dzīvs un var izplatīties vēlāk"

      # Tikai kad jaunais saturs jau tiek pasniegts, atbrīvojam deployment,
      # lai tas nebloķē nākamo push (statuss pats nekad nepabeidzas).
      - name: Atbrīvo savu deployment
        if: steps.gaida.outputs.found == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/deployments/${{ github.sha }}/cancel" || true
